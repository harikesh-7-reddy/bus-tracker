<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Tracker Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial,sans-serif;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
}

#error{
    color:red;
    margin-top:10px;
    text-align:center;
}
</style>

</head>
<body>

<div class="login-box">

    <h2>🚌 Bus Tracker Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <div id="error"></div>

</div>

<script>

function login(){

    const user =
        document.getElementById(
            "username"
        ).value;

    const pass =
        document.getElementById(
            "password"
        ).value;

    const users = {

    "bus1": "123456",
    "bus2": "123456",
    "bus3": "123456"

};

if(users[user] === pass){

    localStorage.setItem(
        "loggedIn",
        "true"
    );

    localStorage.setItem(
        "busNumber",
        user
    );

    window.location.href =
        "dashboard.html";

}else{

    document.getElementById(
        "error"
    ).innerText =
        "Invalid Username or Password";
}

}

</script>

</body>
</html>
